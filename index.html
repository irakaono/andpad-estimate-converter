<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KKai - 小泉建設AIツール</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="KKai">
<meta name="theme-color" content="#27ae60">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f0f4f0;min-height:100vh;}

/* ヘッダー */
.header{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:20px 16px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(39,174,96,0.3);}
.header-icon{width:56px;height:56px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.header-icon img{width:100%;height:100%;object-fit:cover;}
.header-text h1{font-size:22px;font-weight:700;color:white;letter-spacing:0.5px;}
.header-text p{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;letter-spacing:1px;}

/* メインコンテンツ */
.main{padding:20px 14px;max-width:600px;margin:0 auto;}
.section-title{font-size:13px;font-weight:600;color:#888;letter-spacing:1px;margin-bottom:12px;padding-left:4px;}

/* ツールカード */
.tools{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.tool-card{background:white;border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.04);cursor:pointer;text-decoration:none;transition:transform .15s,box-shadow .15s;}
.tool-card:active{transform:scale(0.98);}
.tool-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.tool-card.disabled{opacity:0.5;cursor:default;pointer-events:none;}
.tool-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.tool-icon.green{background:#e8f8ef;}
.tool-icon.blue{background:#e8f0fb;}
.tool-icon.orange{background:#fef3e8;}
.tool-icon.purple{background:#f0ecff;}
.tool-icon.gray{background:#f0f0f0;}
.tool-info{flex:1;}
.tool-name{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:3px;}
.tool-desc{font-size:12px;color:#888;line-height:1.4;}
.tool-badge{flex-shrink:0;}
.badge-new{background:#27ae60;color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:0.5px;}
.badge-soon{background:#f0f0f0;color:#aaa;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.badge-arrow{color:#ccc;font-size:20px;font-weight:300;}

/* フッター */
.footer{text-align:center;padding:20px;font-size:12px;color:#bbb;}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">
    <img src="icon.png" alt="KKai">
  </div>
  <div class="header-text">
    <h1>KKai</h1>
    <p>KOIZUMI KENSETSU AI TOOLS</p>
  </div>
</div>

<div class="main">
  <div class="section-title">ツール一覧</div>
  <div class="tools">

    <a class="tool-card" href="estimate.html">
      <div class="tool-icon green">📋</div>
      <div class="tool-info">
        <div class="tool-name">見積インポート変換</div>
        <div class="tool-desc">業者のExcel・CSVをアンドパッド形式に自動変換</div>
      </div>
      <div class="tool-badge"><span class="badge-arrow">›</span></div>
    </a>

    <div class="tool-card disabled">
      <div class="tool-icon blue">🏗️</div>
      <div class="tool-info">
        <div class="tool-name">工事完了報告書</div>
        <div class="tool-desc">現場写真と工事内容をまとめて報告書を自動生成</div>
      </div>
      <div class="tool-badge"><span class="badge-soon">Coming Soon</span></div>
    </div>

    <div class="tool-card disabled">
      <div class="tool-icon orange">🔍</div>
      <div class="tool-info">
        <div class="tool-name">雨漏り調査報告書</div>
        <div class="tool-desc">調査結果・写真から報告書を自動作成</div>
      </div>
      <div class="tool-badge"><span class="badge-soon">Coming Soon</span></div>
    </div>

    <div class="tool-card disabled">
      <div class="tool-icon purple">🧮</div>
      <div class="tool-info">
        <div class="tool-name">AI積算アシスト</div>
        <div class="tool-desc">図面・仕様書から数量・金額を自動算出</div>
      </div>
      <div class="tool-badge"><span class="badge-soon">Coming Soon</span></div>
    </div>

    <div class="tool-card disabled">
      <div class="tool-icon gray">📌</div>
      <div class="tool-info">
        <div class="tool-name">点検報告書</div>
        <div class="tool-desc">定期点検の結果を簡単に報告書化</div>
      </div>
      <div class="tool-badge"><span class="badge-soon">Coming Soon</span></div>
    </div>

  </div>
</div>

<div class="footer">KKai © 小泉建設株式会社</div>

</body>
</html>
